<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Olá Mundo com Estilo</title>
    <style>
        /* O CSS começa aqui */
        body {
            background-color: #f0f2f5; /* Cor de fundo leve */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Ocupa a altura inteira da tela */
            margin: 0;
        }

        h1 {
            color: #2c3e50;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: #7f8c8d;
            font-size: 1.2rem;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Este site agora tem estilo.</p>
</body>
</html>
