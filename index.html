<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duelo de Espadas JS</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        
        #arena { 
            position: relative; width: 700px; height: 350px; 
            background: #2c3e50; border-bottom: 10px solid #7f8c8d; overflow: hidden; 
        }

        /* Interface */
        .hud { width: 700px; display: flex; justify-content: space-between; margin-bottom: 15px; }
        .barra { width: 300px; height: 25px; background: #444; border: 2px solid #ecf0f1; position: relative; }
        .vida { height: 100%; background: #c0392b; width: 100%; transition: width 0.2s; }
        .nome { position: absolute; top: -20px; font-weight: bold; }

        /* Personagens */
        .lutador { 
            position: absolute; bottom: 10px; width: 40px; height: 90px; 
            transition: transform 0.1s;
        }
        
        #p1 { left: 100px; background: #2980b9; }
        #p2 { right: 100px; background: #d35400; }

        /* As Espadas */
        .espada {
            position: absolute;
            top: 30px;
            width: 60px;
            height: 6px;
            background: #bdc3c7;
            border: 1px solid #7f8c8d;
            border-radius: 5px;
            opacity: 0; /* Invisível até o ataque */
            transition: transform 0.1s, opacity 0.1s;
        }

        /* P1 ataca para a direita, P2 para a esquerda */
        #p1 .espada { left: 40px; transform-origin: left center; }
        #p2 .espada { right: 40px; transform-origin: right center; }

        /* Animação de Ataque */
        .atacando .espada {
            opacity: 1;
            transform: rotate(45deg); /* Movimento de corte */
        }

        .controles { margin-top: 30px; padding: 10px; border: 1px dashed #555; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="barra"><span class="nome">Cavaleiro Azul</span><div id="vida1" class="vida"></div></div>
        <div class="barra"><span class="nome">Guerreiro Rubro</span><div id="vida2" class="vida" style="float:right"></div></div>
    </div>

    <div id="arena">
        <div id="p1" class="lutador"><div class="espada"></div></div>
        <div id="p2" class="lutador"><div class="espada"></div></div>
    </div>

    <div class="controles">
        <strong>P1:</strong> A/D - Espaço (Ataque) | <strong>P2:</strong> Setas - Enter (Ataque)
    </div>

    <script>
        const p1 = { el: document.getElementById('p1'), x: 100, hp: 100, hpEl: document.getElementById('vida1'), atacando: false };
        const p2 = { el: document.getElementById('p2'), x: 560, hp: 100, hpEl: document.getElementById('vida2'), atacando: false };
        const alcanceEspada = 100;

        document.addEventListener('keydown', (e) => {
            // Movimentação
            if (e.code === 'KeyA' && p1.x > 0) p1.x -= 20;
            if (e.code === 'KeyD' && p1.x < p2.x - 40) p1.x += 20;
            if (e.code === 'ArrowLeft' && p2.x > p1.x + 40) p2.x -= 20;
            if (e.code === 'ArrowRight' && p2.x < 660) p2.x += 20;

            // Ataques
            if (e.code === 'Space') atacar(p1, p2);
            if (e.code === 'Enter') atacar(p2, p1);

            atualizarCenario();
        });

        function atacar(atq, vit) {
            if (atq.atacando) return; // Evita spam de ataque
            atq.atacando = true;
            atq.el.classList.add('atacando');

            // Verifica se a ponta da espada atinge o corpo do outro
            const distancia = Math.abs(p1.x - p2.x);
            if (distancia < alcanceEspada) {
                vit.hp -= 15;
                if (vit.hp < 0) vit.hp = 0;
                vit.hpEl.style.width = vit.hp + '%';
                
                if (vit.hp === 0) {
                    setTimeout(() => { alert("Vitória!"); location.reload(); }, 100);
                }
            }

            setTimeout(() => {
                atq.el.classList.remove('atacando');
                atq.atacando = false;
            }, 250);
        }

        function atualizarCenario() {
            p1.el.style.left = p1.x + 'px';
            p2.el.style.left = p2.x + 'px';
        }
    </script>
</body>
</html>
