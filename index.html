<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo Espacial</title>
    <style>
        /* 1. Configuração do Espaço */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020205;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .universo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0f0123 0%, #020205 100%);
        }

        /* 2. Estrelas Animadas */
        .estrelas {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 
                20vw 10vh #fff, 80vw 20vh #fff, 50vw 50vh #fff, 
                10vw 80vh #fff, 90vw 90vh #fff, 30vw 40vh #aaa,
                70vw 60vh #fff, 25vw 15vh #fff, 75vw 10vh #aaa;
            animation: twinkle 5s infinite alternate;
        }

        /* 3. O Planeta */
        .container {
            text-align: center;
            z-index: 10;
        }

        .planeta {
            width: 200px;
            height: 200px;
            background: #2a4d69; /* Cor base (Oceano) */
            border-radius: 50%;
            margin: 0 auto 20px;
            position: relative;
            
            /* Efeito de Textura e Rotação */
            background-image: repeating-linear-gradient(
                90deg,
                transparent 0,
                transparent 50px,
                rgba(34, 139, 34, 0.6) 50px,
                rgba(34, 139, 34, 0.6) 100px
            );
            background-size: 200% 100%;
            
            /* Sombra interna para parecer uma esfera (3D) */
            box-shadow: 
                inset -30px -30px 50px #000, 
                0 0 20px rgba(0, 150, 255, 0.3);
            
            animation: rotatePlaneta 8s linear infinite;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* 4. Animações */
        @keyframes rotatePlaneta {
            from { background-position: 0 0; }
            to { background-position: -400px 0; }
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="universo">
        <div class="estrelas"></div>
    </div>

    <div class="container">
        <div class="planeta"></div>
        <h1>Olá Mundo</h1>
    </div>

</body>
</html>
