<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra - Modo Claro/Escuro</title>
    <style>
        /* Variáveis de cores para facilitar a troca */
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --container-shadow: rgba(70, 130, 180, 0.5);
            --btn-bg: #ffffff;
            --btn-text: #000000;
        }

        /* Cores do Modo Claro */
        .light-mode {
            --bg-color: #f0f2f5;
            --text-color: #2c3e50;
            --container-shadow: rgba(0, 0, 0, 0.2);
            --btn-bg: #2c3e50;
            --btn-text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            flex-direction: column;
            transition: background-color 0.4s, color 0.4s; /* Transição suave */
        }

        /* Botão de Alternância */
        .theme-toggle {
            position: absolute;
            top: 20px;
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 20px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        /* Container da Terra */
        .terra-container {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            box-shadow: 0 0 50px var(--container-shadow); 
            overflow: hidden;
            transition: box-shadow 0.4s;
        }

        .terra-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .terra-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 20px -20px 50px rgba(0, 0, 0, 0.6);
            border-radius: 50%;
        }

        h1 {
            margin-top: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">Trocar Tema</button>

    <div class="terra-container">
        <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=600&q=80" 
             alt="Terra" 
             class="terra-img">
    </div>

    <h1>Planeta Terra</h1>

    <script>
        function toggleTheme() {
            // Adiciona ou remove a classe 'light-mode' do corpo da página
            document.body.classList.toggle('light-mode');
            
            // Opcional: Mudar o texto do botão
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('light-mode')) {
                btn.textContent = "Modo Escuro";
            } else {
                btn.textContent = "Modo Claro";
            }
        }
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar - Background</title>
    <style>
        /* Reset básico para ocupar a tela toda */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; /* Evita barras de rolagem indesejadas */
        }

        /* Container Principal com a Imagem de Fundo */
        .solar-system-bg {
            /* Substitua o URL abaixo pela sua imagem preferida do sistema solar */
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                              url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&q=80&w=2072');
            
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed; /* Efeito de fundo estático */
            
            height: 100vh;
            width: 100%;
            
            /* Centralização do conteúdo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Estilização do Texto */
        .content h1 {
            color: #ffffff;
            font-size: clamp(2rem, 8vw, 5rem); /* Fonte responsiva */
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
            margin-bottom: 10px;
        }

        .content p {
            color: #d1d1d1;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* Pequeno detalhe de brilho animado (opcional) */
        .content h1 {
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #22313f; }
            to { text-shadow: 0 0 20px #fff, 0 0 40px #34495e, 0 0 50px #34495e; }
        }
    </style>
</head>
<body>

    <div class="solar-system-bg">
        <div class="content">
            <h1>Sistema Solar</h1>
            <p>Explore o infinito e além</p>
        </div>
    </div>

</body>
</html>
