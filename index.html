<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo do Universo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020205; /* Preto profundo */
        }

        /* Camada principal do espaço */
        .universo {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(15, 1, 35, 1) 0%, rgba(2, 2, 5, 1) 80%),
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 100% 100%, 550px 550px;
        }

        /* Gerador de estrelas com box-shadow */
        .estrelas {
            width: 1px;
            height: 1px;
            background: transparent;
            /* Cada par de números cria uma estrela (x, y, cor) */
            box-shadow: 
                10vw 20vh #fff, 25vw 55vh #fff, 40vw 15vh #fff, 
                60vw 80vh #fff, 85vw 30vh #fff, 15vw 90vh #fff,
                50vw 10vh #fff, 75vw 45vh #fff, 95vw 70vh #fff,
                30vw 30vh #fff, 10vw 60vh #fff, 65vw 20vh #fff;
            animation: brilho 4s infinite alternate;
        }

        /* Efeito de nebulosa suave */
        .nebulosa {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(100, 0, 255, 0.05), transparent 40%),
                        radial-gradient(circle at 20% 70%, rgba(0, 200, 255, 0.05), transparent 40%);
            filter: blur(50px);
        }

        @keyframes brilho {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="universo">
        <div class="nebulosa"></div>
        <div class="estrelas"></div>
    </div>

</body>
</html>
