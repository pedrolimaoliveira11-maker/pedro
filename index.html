<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Judo Combat - CSS Edition</title>
    <style>
        :root {
            --tatame: #2c3e50;
            --judogi-white: #fdfdfd;
            --judogi-blue: #2980b9;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ecf0f1;
            font-family: 'Arial', sans-serif;
        }

        /* Arena de Luta */
        .dojo {
            position: relative;
            width: 600px;
            height: 300px;
            background-color: var(--tatame);
            border: 10px solid #c0392b;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            margin-top: 50px;
        }

        /* Personagens (Shapes Básicos) */
        .judoca {
            width: 60px;
            height: 100px;
            position: absolute;
            bottom: 20px;
            transition: transform 0.5s ease;
        }

        .player {
            background-color: var(--judogi-white);
            left: 200px;
            border-radius: 5px 5px 0 0;
            z-index: 2;
        }

        .enemy {
            background-color: var(--judogi-blue);
            right: 200px;
            border-radius: 5px 5px 0 0;
        }

        /* Lógica do Golpe usando Checkbox */
        #attack-trigger { display: none; }

        .btn-attack {
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
