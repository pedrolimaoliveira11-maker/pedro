<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra - Modo Claro/Escuro</title>
    <style>
        /* Variáveis de cores para facilitar a troca */
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --container-shadow: rgba(70, 130, 180, 0.5);
            --btn-bg: #ffffff;
            --btn-text: #000000;
        }

        /* Cores do Modo Claro */
        .light-mode {
            --bg-color: #f0f2f5;
            --text-color: #2c3e50;
            --container-shadow: rgba(0, 0, 0, 0.2);
            --btn-bg: #2c3e50;
            --btn-text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            flex-direction: column;
            transition: background-color 0.4s, color 0.4s; /* Transição suave */
        }

        /* Botão de Alternância */
        .theme-toggle {
            position: absolute;
            top: 20px;
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 20px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        /* Container da Terra */
        .terra-container {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            box-shadow: 0 0 50px var(--container-shadow); 
            overflow: hidden;
            transition: box-shadow 0.4s;
        }

        .terra-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .terra-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 20px -20px 50px rgba(0, 0, 0, 0.6);
            border-radius: 50%;
        }

        h1 {
            margin-top: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">Trocar Tema</button>

    <div class="terra-container">
        <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=600&q=80" 
             alt="Terra" 
             class="terra-img">
    </div>

    <h1>Planeta Terra</h1>

    <script>
        function toggleTheme() {
            // Adiciona ou remove a classe 'light-mode' do corpo da página
            document.body.classList.toggle('light-mode');
            
            // Opcional: Mudar o texto do botão
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('light-mode')) {
                btn.textContent = "Modo Escuro";
            } else {
                btn.textContent = "Modo Claro";
            }
        }
