<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Defender: Ultimate Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        
        #game-container { 
            width: 100vw; height: 100vh; 
            background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%); 
            position: relative; overflow: hidden; 
        }

        /* Tremor de tela */
        .shake { animation: shakeAnim 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
        }

        /* Interface (HUD) */
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 100; pointer-events: none; }
        .stat { font-size: 22px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,255,65,0.5); }
        #lives { color: #ff4757; }
        #level-tag { color: #ffff00; font-size: 14px; }

        /* FOGUETE */
        #player {
            width: 30px; height: 60px; position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: #ecf0f1; border-radius: 50% 50% 10% 10%;
            box-shadow: inset -5px 0 0 #bdc3c7; z-index: 10;
        }
        #player::before { /* Bico */
            content: ''; position: absolute; top: -15px; left: 0; width: 30px; height: 20px;
            background: #ff4757; clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        #player::after { /* Asas */
            content: ''; position: absolute; bottom: -10px; left: -10px; width: 50px; height: 30px;
            background: linear-gradient(90deg, #ff4757 20%, transparent 20%, transparent 80%, #ff4757 80%);
            clip-path: polygon(0% 100%, 20% 0%, 80% 0%, 100% 100%); z-index: -1;
        }
        .thrust {
            position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 20px; background: linear-gradient(to bottom, #ff9f43, transparent);
            border-radius: 0 0 50% 50%; animation: flicker 0.1s infinite alternate;
        }
        @keyframes flicker { from { height: 15px; opacity: 0.8; } to { height: 25px; opacity: 1; } }

        /* ESCUDO */
        #shield-visual {
            display: none; position: absolute; width: 90px; height: 90px;
            border: 3px solid #00d2ff; border-radius: 50%; top: 50%; left: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 20px #00d2ff, inset 0 0 15px #00d2ff;
            animation: shieldPulse 0.5s infinite alternate; pointer-events: none;
        }
        @keyframes shieldPulse { from { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 0.7; transform: translate(-50%, -50%) scale(1.1); } }

        /* TIROS, INIMIGOS E ITENS */
        .bullet { width: 4px; height: 20px; background: #ffff00; position: absolute; box-shadow: 0 0 10px #ffff00; border-radius: 2px; }
        .alien { width: 40px; height: 30px; background: #00ff41; position: absolute; border-radius: 5px; box-shadow: -10px 10px 0 #00ff41, 10px 10px 0 #00ff41; }
        .boss { width: 160px; height: 90px; background: #8e44ad; position: absolute; border-radius: 20px 20px 60px 60px; box-shadow: 0 0 40px #9b59b6; z-index: 5; transition: top 2s ease; }
        .power-up { width: 30px; height: 30px; background: #00d2ff; position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; box-shadow: 0 0 15px #00d2ff; animation: spin 2s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.4; animation: starFall linear infinite; }
        @keyframes starFall { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }

        .particle { position: absolute; width: 4px; height: 4px; background: #ffca28; border-radius: 50%; pointer-events: none; }

        /* TELAS */
        #msg-overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #ffff00; font-size: 32px; font-weight: bold; pointer-events: none; text-shadow: 0 0 15px #000; z-index: 200; opacity: 0; }
        .fade-in-out { animation: fadeInOut 2s forwards; }
        @keyframes fadeInOut { 0% { opacity:0; transform: translate(-50%, 0%); } 20% { opacity:1; } 80% { opacity:1; } 100% { opacity:0; transform: translate(-50%, -100%); } }

        #game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; z-index: 1000; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 20px; border: 2px solid #ff4757; }
        button { padding: 15px 30px; background: #00ff41; border: none; cursor: pointer; font-size: 18px; font-weight: bold; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="stat">SCORE: <span id="score-val">0</span></div>
        <div class="stat">LIVES: <span id="lives-val">3</span></div>
        <div id="level-tag">LEVEL 1: TIRO SIMPLES</div>
    </div>

    <div id="msg-overlay"></div>

    <div id="game-over
