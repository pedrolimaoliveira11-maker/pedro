    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra</title>
    <style>
        /* Estilização do Fundo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #050505; /* Cor do espaço */
            color: white;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }

        /* Container da Imagem */
        .terra-container {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            /* Sombra externa para brilho atmosférico */
            box-shadow: 0 0 50px rgba(70, 130, 180, 0.5); 
            overflow: hidden;
        }

        /* A Imagem da Terra */
        .terra-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Efeito de sombra interna para parecer uma esfera */
        .terra-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 20px -20px 50px rgba(0, 0, 0, 0.8), 
                        inset -5px 5px 15px rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        h1 {
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="terra-container">
        <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=600&q=80" 
             alt="Planeta Terra visto do espaço" 
             class="terra-img">
    </div>

    <p>PLANETA TERRA</p> 
    
</body>
</html>
