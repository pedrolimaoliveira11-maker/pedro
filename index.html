<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duelo de Stickmen</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #arena { 
            position: relative; width: 800px; height: 400px; 
            background: #222; border-bottom: 5px solid #555; 
        }

        /* HUD de Vida */
        .hud { width: 800px; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .barra { width: 350px; height: 15px; background: #444; border-radius: 10px; overflow: hidden; border: 2px solid #fff; }
        .vida { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }

        /* Estrutura do Boneco */
        .stickman {
            position: absolute; bottom: 0; width: 40px; height: 120px;
            transition: left 0.1s, transform 0.2s;
        }

        /* Partes do corpo */
        .cabeca { 
            width: 30px; height: 30px; border: 4px solid white; 
            border-radius: 50%; margin: 0 auto; 
        }
        .corpo { 
            width: 4px; height: 50px; background: white; margin: 0 auto; 
        }
        .braco {
            position: absolute; top: 40px; width: 40px; height: 4px; 
            background: white; transform-origin: left center;
            transition: transform 0.1s;
        }
        
        /* Espada na mão */
        .espada-stick {
            position: absolute; right: -50px; top: -2px;
            width: 60px; height: 4px; background: #bdc3c7;
            border-top: 2px solid #fff; opacity: 0.8;
        }

        /* Diferenciar Players */
        #p1 .braco { left: 20px; }
        #p2 { transform: scaleX(-1); } /* Inverte o player 2 */
        #p2 .cabeca, #p2 .corpo, #p2 .braco { border-color: #e74c3c; background: #e74c3c; }

        /* Animação de Ataque */
        .atacando .braco {
            transform: rotate(-45deg); /* Levanta e desce o braço */
        }

        .controles { margin-top: 20px; color: #888; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="barra"><div id="vida1" class="vida"></div></div>
        <div class="barra"><div id="vida2" class="vida"></div></div>
    </div>

    <div id="arena">
        <div id="p1" class="stickman">
            <div class="cabeca"></div>
            <div class="corpo"></div>
            <div class="braco">
                <div class="espada-stick"></div>
            </div>
        </div>

        <div id="p2" class="stickman">
            <div class="cabeca"></div>
            <div class="corpo"></div>
            <div class="braco">
                <div class="espada-stick"></div>
            </div>
        </div>
    </div>

    <div class="controles">
        P1: [A][D] Mover | [Espaço] Atacar --- P2: [Seta Esq][Seta Dir] Mover | [Enter] Atacar
    </div>

    <script>
        const p1 = { el: document.getElementById('p1'), x: 100, hp: 100, hpEl: document.getElementById('vida1') };
        const p2 = { el: document.getElementById('p2'), x: 650, hp: 100, hpEl: document.getElementById('vida2') };

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA' && p1.x > 0) p1.x -= 15;
            if (e.code === 'KeyD' && p1.x < p2.x - 60) p1.x += 15;
            if (e.code === 'ArrowLeft' && p2.x > p1.x + 60) p2.x -= 15;
            if (e.code === 'ArrowRight' && p2.x < 750) p2.x += 15;

            if (e.code === 'Space') golpear(p1, p2);
            if (e.code === 'Enter') golpear(p2, p1);

            atualizar();
        });

        function golpear(atq, vit) {
            atq.el.classList.add('atacando');
            
            // Verifica colisão da espada
            const distancia = Math.abs(p1.x - p2.x);
            if (distancia < 120) {
                vit.hp -= 10;
                vit.hpEl.style.width = vit.hp + '%';
                if (vit.hp <= 0) {
                    alert("Fim de Jogo!");
                    location.reload();
                }
            }

            setTimeout(() => atq.el.classList.remove('atacando'), 150);
        }

        function atualizar() {
            p1.el.style.left = p1.x + 'px';
            p2.el.style.left = p2.x + 'px';
        }
    </script>
</body>
</html>
