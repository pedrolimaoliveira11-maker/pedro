<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CSS Street Fighter Clone</title>
    <style>
        /* Cenário */
        body {
            margin: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #cenario {
            position: relative;
            width: 800px;
            height: 400px;
            background: linear-gradient(to bottom, #444 70%, #222 70%);
            border: 5px solid #fff;
            overflow: hidden;
        }

        /* Personagens */
        .personagem {
            position: absolute;
            bottom: 50px;
            width: 80px;
            height: 120px;
            transition: transform 0.1s;
        }

        #player1 {
            left: 100px;
            background-color: #3498db; /* Azul */
        }

        #player2 {
            right: 100px;
            background-color: #e74c3c; /* Vermelho */
            transform: scaleX(-1);
        }

        /* Barra de Vida */
        .hud {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }

        .barra-vida {
            width: 300px;
            height: 20px;
            background: #555;
            border: 2px solid #fff;
        }

        .vida-cheia {
            height: 100%;
            background: #2ecc71;
            width: 100%;
            transition: width 0.3s;
        }

        /* Mecânica de Ataque (Simulação com :active) */
        #player1:active {
            transform: translateX(50px) scaleX(1.2);
            background-color: #f1c40f;
        }

        /* Animação de idle (respirando) */
        @keyframes idle {
            0%, 100% { height: 120px; }
            50% { height: 115px; }
        }

        .personagem {
            animation: idle 1s infinite;
        }

        /* Instruções */
        .instrucoes {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>

    <div id="cenario">
        <div class="instrucoes">CLIQUE E SEGURE NO QUADRADO AZUL PARA ATACAR</div>
        
        <div class="hud">
            <div class="barra-vida"><div class="vida-cheia" id="hp1"></div></div>
            <div class="barra-vida"><div class="vida-cheia" id="hp2"></div></div>
        </div>

        <div id="player1" class="personagem"></div>
        <div id="player2" class="personagem"></div>
    </div>

</body>
</html>
