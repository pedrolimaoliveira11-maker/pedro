<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rocket Defender - Final Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
        #game-container { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%); position: relative; overflow: hidden; }

        /* Interface */
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff41; z-index: 100; pointer-events: none; }
        .stat { font-size: 20px; text-shadow: 0 0 10px #00ff41; margin-bottom: 5px; }

        /* FOGUETE */
        #player {
            width: 30px; height: 60px; position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: #ecf0f1; border-radius: 50% 50% 10% 10%;
            box-shadow: inset -5px 0 0 #bdc3c7; z-index: 10;
        }
        #player::before {
            content: ''; position: absolute; top: -15px; left: 0; width: 30px; height: 20px;
            background: #ff4757; clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        #player::after {
            content: ''; position: absolute; bottom: -10px; left: -10px; width: 50px; height: 30px;
            background: linear-gradient(90deg, #ff4757 20%, transparent 20%, transparent 80%, #ff4757 80%);
            clip-path: polygon(0% 100%, 20% 0%, 80% 0%, 100% 100%); z-index: -1;
        }
        .thrust {
            position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 20px; background: linear-gradient(to bottom, #ff9f43, transparent);
            border-radius: 0 0 50% 50%; animation: flicker 0.1s infinite alternate;
        }
        @keyframes flicker { from { height: 15px; opacity: 0.8; } to { height: 25px; opacity: 1; } }

        /* FUMAÇA DO RASTRO */
        .smoke {
            position: absolute; width: 8px; height: 8px; background: rgba(255, 255, 255, 0.3);
            border-radius: 50%; pointer-events: none; z-index: 5;
        }
