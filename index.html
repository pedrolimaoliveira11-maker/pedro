<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Defender: Evolution War</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
        #game-container { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%); position: relative; overflow: hidden; }
        
        .shake { animation: shakeAnim 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
        }

        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 100; pointer-events: none; }
        .stat { font-size: 22px; font-weight: bold; text-shadow: 0 0 10px #00ff41; margin-bottom: 5px; }
        #level-msg { color: #ffff00; font-size: 16px; font-weight: bold; }

        /* FOGUETE */
        #player {
            width: 30px; height: 60px; position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: #ecf0f1; border-radius: 50% 50% 10% 10%;
            box-shadow: inset -5px 0 0 #bdc3c7; z-index: 10;
        }
        #player::before { content: ''; position: absolute; top: -15px; left: 0; width: 30px; height: 20px; background: #ff4757; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        #player::after { content: ''; position: absolute; bottom: -10px; left: -10px; width: 50px; height: 30px; background: linear-gradient(90deg, #ff4757 20%, transparent 20%, transparent 80%, #ff4757 80%); clip-path: polygon(0% 100%, 20% 0%, 80% 0%, 100% 100%); z-index: -1; }
        .thrust { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); width: 12px; height: 20px; background: linear-gradient(to bottom, #ff9f43, transparent); border-radius: 0 0 50% 50%; animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { height: 15px; opacity: 0.8; } to { height: 25px; opacity: 1; } }

        /* TIROS */
        .bullet { width: 4px; height: 20px; background: #ffff00; position: absolute; border-radius: 2px; box-shadow: 0 0 10px #ffff00; }
        .alien-bullet { width: 6px; height: 15px; background: #ff00ff; position: absolute; border-radius: 50% 50% 0 0; box-shadow: 0 0 10px #ff00ff; }

        /* INIMIGOS */
        .alien { width: 40px; height: 30px; background: #00ff41; position: absolute; border-radius: 5px; box-shadow: -10px 10px 0 #00ff41, 10px 10px 0 #00ff41; }
        .boss { width: 180px; height: 100px; background: linear-gradient(180deg, #4b0082, #000); position: absolute; border-radius: 20px 20px 80px 80px; box-shadow: 0 0 50px #ff00ff; z-index: 5; border: 2px solid #ff00ff; transition: top 2s ease; }

        /* OUTROS */
        #shield-visual { display: none; position: absolute; width: 90px; height: 90px; border: 3px solid #00d2ff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #00d2ff; animation: pulse 0.5s infinite alternate; }
