<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Final Boss Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            position: relative;
            overflow: hidden;
        }

        /* HUD - Interface */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff41;
            z-index: 100;
        }
        .stat { font-size: 20px; margin-bottom: 5px; text-shadow: 0 0 8px #00ff41; }
        #life-display { color: #ff4757; text-shadow: 0 0 8px #ff4757; }

        /* Estrelas */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: moveStars linear infinite;
        }
        @keyframes moveStars {
            from { transform: translateY(-10vh); }
            to { transform: translateY(110vh); }
        }

        /* Nave Jogador */
        #player {
            width: 50px;
            height: 50px;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(to top, #ff4757, #ff6b81);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            box-shadow: 0 0 15px #ff4757;
            z-index: 10;
        }

        /* Inimigo Alien */
        .alien {
            width: 40px;
            height: 30px;
            position: absolute;
            background-color: #00ff41;
            box-shadow: -10px 10px 0 #00ff41, 10px 10px 0 #00ff41, -15px -5px 0 #00ff41, 15px -5px 0 #00ff41;
            border-radius: 5px;
        }
        .alien::before, .alien::after {
            content: ''; position: absolute; width: 8px; height: 8px;
            background: black; top: 8px; border-radius: 50%;
        }
        .alien::before { left: 8px; } .alien::after { right: 8px; }

        /* Chefão (Boss) */
        .boss {
            width: 180px;
            height: 100px;
            background: linear-gradient(180deg, #8e44ad, #2c3e50);
            position: absolute;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 20px 20px 80px 80px;
            box-shadow: 0 0 40px #9b59b6;
            z-index: 5;
            transition: top 2s ease-out;
        }

        /* Tiro */
        .bullet {
            width: 4px;
            height: 20px;
            background: #ffff00;
            position: absolute;
            box-shadow: 0 0 10px #ffff00;
            border-radius: 2px;
        }

        /* Explosão */
        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #fffa00;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Game Over */
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 1000;
        }
        button {
            padding: 10px 20px;
            font-size: 20px;
            background: #00ff41;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="stat">PONTOS: <span id="score">0</span></div>
        <div class="stat">VIDA: <span id="life-display">3</span></div>
    </div>

    <div id="game-over">
        <h1>MISSAO FALHOU</h1>
        <p>O Universo foi dominado.</p>
        <button onclick="location.reload()">TENTAR NOVAMENTE</button>
    </div>

    <div id="player"></div>
</div>

<script>
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const lifeEl = document.getElementById('life-display');
    const gameOverScreen = document.getElementById('game-over');

    let playerX = window.innerWidth / 2;
    let score = 0;
    let lives = 3;
    let gameActive = true;
    let bossActive = false;

    // 1. Criar Estrelas
    function initStars() {
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            container.appendChild(star);
        }
    }

    // 2. Movimentação do Jogador
    document.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if (e.key === 'ArrowLeft' || e.key === 'a') playerX -= 30;
        if (e.key === 'ArrowRight' || e.key === 'd') playerX += 30;
        if (e.key === ' ') fireBullet();

        playerX = Math.max(25, Math.min(window.innerWidth - 25, playerX));
        player.style.left = playerX + 'px';
    });

    // 3. Sistema de Tiros
    function fireBullet() {
        const bullet = document.createElement('div');
        bullet.className = 'bullet';
        bullet.style.left = (playerX - 2) + 'px';
        bullet.style.bottom = '80px';
        container.appendChild(bullet);

        let bPos = 80;
        const moveBullet = setInterval(() => {
            bPos += 15;
            bullet.style.bottom = bPos + 'px';

            // Checar colisão com alvos
            const targets = document.querySelectorAll('.alien, .boss');
            targets.forEach(target => {
                if (isColliding(bullet, target)) {
                    if (target.classList.contains('boss')) {
                        target.hp -= 1;
                        createExplosion(bullet.offsetLeft, target.offsetTop + target.offsetHeight);
                        bullet.remove();
                        clearInterval(moveBullet);
                        if (target.hp <= 0) {
                            handleDestruction(target, 5000);
                            bossActive = false;
                        }
                    } else {
                        handleDestruction(target, 100);
                        bullet.remove();
                        clearInterval(moveBullet);
                    }
                }
            });

            if (bPos > window.innerHeight) {
                clearInterval(moveBullet);
                bullet.remove();
            }
        }, 20);
    }

    function handleDestruction(target, points) {
        const rect = target.getBoundingClientRect();
        createExplosion(rect.left + rect.width/2, rect.top + rect.height/2);
        score += points;
        scoreEl.innerText = score;
        target.remove();
    }

    // 4. Inimigos e Boss
    function spawnEnemy() {
        if (!gameActive) return;

        // Gatilho do Boss
        if (score >= 2000 && !bossActive) {
            spawnBoss();
            return;
        }

        if (bossActive) return; // Não spawna aliens pequenos durante o Boss

        const alien = document.createElement('div');
        alien.className = 'alien';
        alien.style.left = Math.random() * (window.innerWidth - 60) + 30 + 'px';
        alien.style.top = '-50px';
        container.appendChild(alien);

        let aPos = -50;
        const moveAlien = setInterval(() => {
            if (!gameActive) { clearInterval(moveAlien); return; }
            aPos += 3;
            alien.style.top = aPos + 'px';

            if (isColliding(alien, player)) {
                takeDamage();
                alien.remove();
                clearInterval(moveAlien);
            }

            if (aPos > window.innerHeight) {
                alien.remove();
                clearInterval(moveAlien);
            }
        }, 30);
    }

    function spawnBoss() {
        bossActive = true;
        const boss = document.createElement('div');
        boss.className = 'boss';
        boss.hp = 30; 
        container.appendChild(boss);
        setTimeout(() => { boss.style.top = '60px'; }, 100);
    }

    // 5. Utilidades (Dano, Colisão e Explosão)
    function takeDamage() {
        lives--;
        lifeEl.innerText = lives;
        player.style.filter = "brightness(5)";
        setTimeout(() => player.style.filter = "none", 200);

        if (lives <= 0) {
            gameActive = false;
            gameOverScreen.style.display = 'block';
        }
    }

    function isColliding(a, b) {
        const r1 = a.getBoundingClientRect();
        const r2 = b.getBoundingClientRect();
        return !(r1.top > r2.bottom || r1.bottom < r2.top || r1.right < r2.left || r1.left > r2.right);
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            container.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 6 + 2;
            let px = x, py = y, op = 1;

            const moveP = setInterval(() => {
                px += Math.cos(angle) * speed;
                py += Math.sin(angle) * speed;
                op -= 0.04;
                p.style.left = px + 'px';
                p.style.top = py + 'px';
                p.style.opacity = op;
                if (op <= 0) { clearInterval(moveP); p.remove(); }
            }, 20);
        }
    }

    // Iniciar
    initStars();
    setInterval(spawnEnemy, 1200);

</script>
</body>
</html>
